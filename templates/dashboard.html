<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ella Assistant</title>
    <style>
        /* Compacted CSS Variables & Themes */
        :root { --bg: #fff; --sb: #f9f9f9; --in: #fff; --txt: #0d0d0d; --mut: #6b7280; --brd: #e5e5e5; --acc: #10a37f; }
        body.dark { --bg: #212121; --sb: #171717; --in: #2f2f2f; --txt: #ececec; --mut: #9ca3af; --brd: #424242; }
        
        /* Global & Layout */
        body { margin: 0; font-family: system-ui, sans-serif; display: flex; height: 100vh; background: var(--bg); color: var(--txt); transition: .3s; }
        .chat-area { flex: 1; display: flex; flex-direction: column; position: relative; }
        .sidebar { width: 350px; background: var(--sb); border-left: 1px solid var(--brd); display: flex; flex-direction: column; }
        header, .sb-hdr { padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--brd); }
        
        /* Buttons */
        button { background: transparent; border: 1px solid var(--brd); color: var(--txt); padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: .2s; }
        button:hover { background: var(--sb); }
        .btn-red { color: #ef4444; border-color: #ef4444; }
        
        /* Chat Messages */
        #msgs { flex: 1; overflow-y: auto; padding-bottom: 120px; scroll-behavior: smooth; }
        .msg-row { padding: 24px; display: flex; justify-content: center; }
        .msg-box { width: 100%; max-width: 750px; display: flex; gap: 16px; padding: 0 24px; }
        .ava { width: 32px; height: 32px; border-radius: 4px; color: #fff; font-weight: bold; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .ava.user { background: #2563eb; } .ava.assistant { background: var(--acc); }
        .time { font-size: 11px; color: var(--mut); margin-top: 6px; }
        
        /* Input Area */
        .input-wrap { position: absolute; bottom: 0; width: 100%; padding: 24px; display: flex; flex-direction: column; align-items: center; background: linear-gradient(180deg, transparent, var(--bg) 40%); box-sizing: border-box; }
        .input-box { width: 100%; max-width: 750px; display: flex; background: var(--in); border: 1px solid var(--brd); border-radius: 16px; padding: 4px; position: relative; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        textarea { flex: 1; max-height: 200px; padding: 12px 48px 12px 16px; border: none; background: transparent; color: var(--txt); outline: none; resize: none; font-family: inherit; font-size: 15px; line-height: 1.5; }
        .send-btn { position: absolute; right: 8px; bottom: 8px; width: 32px; height: 32px; background: var(--acc); color: #fff; border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .typing:empty { display: none; } .typing { font-size: 13px; color: var(--mut); margin-bottom: 8px; }
        
        /* Memory Panel */
        pre { background: var(--in); border: 1px solid var(--brd); padding: 12px; border-radius: 8px; font-size: 12px; margin: 16px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; flex: 1; }
    </style>
</head>
<body id="body" class="dark" style="display: none;">
    <div class="chat-area">
        <header>
            <b>Ella Assistant</b>
            <div>
                <button onclick="toggleTheme()">Theme</button>
                <button class="btn-red" onclick="triggerLogout()">Sign Out</button>
            </div>
        </header>
        <div id="msgs"></div>
        <div class="input-wrap">
            <div id="typing" class="typing"></div>
            <div class="input-box">
                <textarea id="msg" rows="1" placeholder="Message Ella..."></textarea>
                <button id="sendBtn" class="send-btn" onclick="send()">➤</button>
            </div>
        </div>
    </div>
    
    <div class="sidebar">
        <div class="sb-hdr">
            <b>Memory Context</b>
            <div>
                <button onclick="loadMem()">Refresh</button>
                <button onclick="req('/memory/clear', 'POST').then(loadMem)">Clear</button>
            </div>
        </div>
        <pre id="memory">Loading...</pre>
    </div>

    <script>
        // 1. DOM Elements
        const el = id => document.getElementById(id);
        const msgInput = el("msg"), msgs = el("msgs"), typing = el("typing"), sendBtn = el("sendBtn");

        // 2. Auth Vault Gatekeeper
        const AUTH_URL = "https://authvault.netlify.app"; // Update if using a custom Netlify URL
        const APP_URL = window.location.origin + window.location.pathname;
        
        if (window.location.hash.includes('access_token=')) {
            localStorage.setItem('auth_vault_token', new URLSearchParams(window.location.hash.substring(1)).get('access_token'));
            window.history.replaceState(null, null, window.location.pathname);
        }
        
        if (!localStorage.getItem('auth_vault_token')) {
            window.location.href = `${AUTH_URL}/.netlify/functions/authorize?redirect_uri=${encodeURIComponent(APP_URL)}`;
        } else {
            document.body.style.display = 'flex';
            init(); // Safe to call now
        }

        function triggerLogout() {
            localStorage.removeItem('auth_vault_token');
            window.location.href = `${AUTH_URL}/.netlify/functions/logout?redirect_uri=${encodeURIComponent(APP_URL)}`;
        }

        // 3. Core Logic
        async function req(path, method="GET", body=null) {
            let opts = { method, headers: { "Content-Type": "application/json", "Authorization": `Bearer ${localStorage.getItem('auth_vault_token')}` }};
            if (body) opts.body = JSON.stringify(body);
            let r = await fetch(path, opts);
            if (!r.ok) throw new Error("API Error");
            return r.json();
        }

        function addBubble(role, text) {
            let time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            msgs.insertAdjacentHTML("beforeend", `
                <div class="msg-row">
                    <div class="msg-box">
                        <div class="ava ${role}">${role === 'user' ? 'U' : 'E'}</div>
                        <div style="flex:1; font-size:15px; line-height:1.6;">
                            <div>${text.replace(/\n/g, '<br>')}</div>
                            <div class="time">${time}</div>
                        </div>
                    </div>
                </div>`);
            msgs.scrollTo({ top: msgs.scrollHeight, behavior: "smooth" });
        }

        async function send() {
            let text = msgInput.value.trim();
            if (!text) return;
            
            addBubble("user", text);
            msgInput.value = ""; msgInput.style.height = "auto";
            typing.innerText = "Ella is typing..."; sendBtn.disabled = true;
            
            try {
                let res = await req("/chat", "POST", { message: text });
                addBubble("assistant", res.response);
                loadMem();
            } catch (e) { typing.innerText = "Error connecting to server."; }
            
            if(typing.innerText === "Ella is typing...") typing.innerText = "";
            sendBtn.disabled = false; msgInput.focus();
        }

        async function loadMem() {
            try {
                let data = await req("/memory");
                el("memory").textContent = JSON.stringify(data, null, 2);
            } catch(e) { el("memory").textContent = "Error loading memory."; }
        }

        async function toggleTheme() {
            let next = document.body.className === "dark" ? "light" : "dark";
            document.body.className = next;
            try { await req("/settings", "POST", { theme: next }); } catch(e) {}
        }

        function init() {
            fetch("/settings").then(r => r.json()).then(s => { if(s.theme) document.body.className = s.theme; }).catch(()=>{});
            loadMem();
            msgInput.focus();
        }

        // 4. Listeners
        msgInput.addEventListener("keydown", e => {
            if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
        });
        msgInput.addEventListener("input", () => {
            msgInput.style.height = "auto";
            msgInput.style.height = Math.min(msgInput.scrollHeight, 200) + "px";
        });
    </script>
</body>
</html>
